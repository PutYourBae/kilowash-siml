<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembayaran | KiloWash</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap">
  <link rel="stylesheet" href="../styles/app.css">
  <style>
    .payment-layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; margin-top: 0; }
    .order-list-item {
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--color-border);
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color .2s, background .2s, transform .15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .order-list-item:hover { border-color: var(--brand-primary); background: rgba(18,184,134,0.03); }
    .order-list-item.selected { border-color: var(--brand-primary); background: rgba(18,184,134,0.06); transform: translateX(4px); }
    .receipt-section { background: var(--color-surface); border-radius: var(--radius-lg); border: 1px solid var(--color-border); position: sticky; top: 80px; }
    .change-positive { color: var(--success); }
    .change-negative { color: var(--danger); }
  </style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>??</text></svg>">
  <meta name="view-transition" content="same-origin">
</head>
<body>
  <div class="app-layout">
    <app-sidebar></app-sidebar>
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">
          <h1>Kasir & Pembayaran</h1>
          <p>Proses pembayaran pelanggan</p>
        </div>
      </div>

      <div class="page-body">
        <div class="payment-layout">
          <!-- Left: Order List -->
          <div>
            <div class="card mb-16" style="padding:16px 20px;">
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="form-control" placeholder="Cari kode order atau nama...">
              </div>
            </div>
            <div class="card">
              <div class="card-header">
                <h3>Pesanan Siap Diambil <span class="badge badge-selesai" id="readyCount">0</span></h3>
              </div>
              <div class="card-body" id="orderListContainer">
                <div class="empty-state"><div class="empty-icon">💤</div><h4>Tidak ada pesanan siap</h4><p>Pesanan yang sudah berstatus Selesai akan muncul di sini</p></div>
              </div>
            </div>
          </div>

          <!-- Right: Payment form -->
          <div class="receipt-section">
            <div class="card-header">
              <h3>Proses Pembayaran</h3>
            </div>

            <div id="emptyState" style="padding:40px;text-align:center;">
              <div style="font-size:40px;margin-bottom:12px;">👈</div>
              <h4 class="fs-14 text-secondary">Pilih pesanan di sebelah kiri</h4>
            </div>

            <div id="paymentForm" style="display:none;">
              <div style="padding:20px 24px;">
                <!-- Summary -->
                <div class="highlight-box mb-16">
                  <div class="d-flex justify-between mb-8">
                    <span class="font-mono fw-700 fs-13" style="color:var(--brand-primary);" id="pCode">—</span>
                    <span class="badge badge-selesai">Selesai</span>
                  </div>
                  <div class="fw-700 fs-15 mb-4" id="pName">—</div>
                  <div class="fs-12 text-muted" id="pMeta">—</div>
                </div>

                <div style="border-top:1px dashed var(--color-border);padding-top:16px;margin-bottom:16px;">
                  <div class="d-flex justify-between mb-8 fs-13">
                    <span class="text-secondary">Subtotal</span>
                    <span id="pSubtotal" class="fw-600">Rp 0</span>
                  </div>
                  <div class="d-flex justify-between fs-16">
                    <span class="fw-700">Total Tagihan</span>
                    <span id="pTotal" class="fw-700" style="color:var(--brand-primary);">Rp 0</span>
                  </div>
                </div>

                <!-- Method -->
                <div class="form-group">
                  <label class="form-label">Metode Pembayaran</label>
                  <div style="display:flex;gap:8px;">
                    <button type="button" class="btn btn-secondary w-100 method-btn active" data-method="tunai" id="methodTunai">💵 Tunai</button>
                    <button type="button" class="btn btn-secondary w-100 method-btn" data-method="transfer" id="methodTransfer">🏦 Transfer</button>
                    <button type="button" class="btn btn-secondary w-100 method-btn" data-method="qris" id="methodQRIS">📱 QRIS</button>
                  </div>
                  <input type="hidden" id="payMethod" value="tunai">
                </div>

                <!-- Amount -->
                <div class="form-group">
                  <label class="form-label">Jumlah Dibayar (Rp)</label>
                  <input type="number" id="payAmount" class="form-control" placeholder="Masukkan nominal" style="font-size:18px;font-weight:700;">
                </div>

                <!-- Change -->
                <div class="highlight-box" style="margin-bottom:20px;">
                  <div class="d-flex justify-between align-center">
                    <span class="fs-13 text-secondary">Kembalian</span>
                    <span id="payChange" class="fw-700 fs-20">Rp 0</span>
                  </div>
                </div>
              </div>

              <div style="padding:16px 24px;border-top:1px solid var(--color-border-light);">
                <input type="hidden" id="payOrderId">
                <input type="hidden" id="payOrderTotal">
                <button class="btn btn-primary btn-block btn-lg" id="btnConfirmPay">✓ Konfirmasi Pembayaran</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Bukti Pembayaran -->
  <div class="modal-overlay" id="receiptModal">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <h3>✅ Pembayaran Berhasil</h3>
        <button class="modal-close" onclick="closeModal('receiptModal');loadOrders();">✕</button>
      </div>
      <div class="modal-body" id="receiptBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="printReceipt()">🖨 Cetak Struk</button>
        <button class="btn btn-primary" onclick="closeModal('receiptModal');loadOrders();">Selesai</button>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    let allOrders = [];
    let selectedTotal = 0;

    document.addEventListener('DOMContentLoaded', () => {
      requireAuth(['admin', 'kasir', 'owner']);
      loadOrders();

      document.getElementById('searchInput').addEventListener('input', debounce(filterOrders, 300));

      document.getElementById('payAmount').addEventListener('input', calcChange);

      // Method buttons
      document.querySelectorAll('.method-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active', 'btn-primary'));
          this.classList.add('active', 'btn-primary');
          document.getElementById('payMethod').value = this.dataset.method;
        });
      });

      document.getElementById('btnConfirmPay').addEventListener('click', processPayment);
    });

    function debounce(fn, d) { let t; return (...a) => { clearTimeout(t); t = setTimeout(()=>fn(...a),d); }; }

    async function loadOrders() {
      const { ok, data } = await api('/orders?status=selesai');
      if (!ok) return;
      allOrders = data.orders;
      renderOrders(allOrders);
      document.getElementById('readyCount').textContent = allOrders.length;

      // Reset form
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('paymentForm').style.display = 'none';
    }

    function renderOrders(orders) {
      const container = document.getElementById('orderListContainer');
      if (orders.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">💤</div><h4>Tidak ada pesanan siap</h4></div>';
        return;
      }
      container.innerHTML = orders.map(o => `
        <div class="order-list-item" id="item-${o.id}" onclick="selectOrder(${o.id})">
          <div>
            <div class="font-mono fw-700 fs-12" style="color:var(--brand-primary);margin-bottom:4px;">${o.order_code}</div>
            <div class="fw-600 fs-13">${o.Customer?.name}</div>
            <div class="fs-12 text-muted">${o.ServiceType?.name} · ${o.weight_kg} Kg</div>
          </div>
          <div class="fw-700 fs-14" style="color:var(--brand-primary);">${formatRp(o.total_price)}</div>
        </div>
      `).join('');
    }

    function filterOrders() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderOrders(allOrders.filter(o =>
        o.order_code.toLowerCase().includes(q) ||
        o.Customer?.name.toLowerCase().includes(q)
      ));
    }

    function selectOrder(id) {
      document.querySelectorAll('.order-list-item').forEach(el => el.classList.remove('selected'));
      document.getElementById(`item-${id}`)?.classList.add('selected');

      const o = allOrders.find(x => x.id === id);
      if (!o) return;

      selectedTotal = parseFloat(o.total_price);
      document.getElementById('payOrderId').value   = o.id;
      document.getElementById('payOrderTotal').value = selectedTotal;
      document.getElementById('pCode').textContent  = o.order_code;
      document.getElementById('pName').textContent  = o.Customer?.name;
      document.getElementById('pMeta').textContent  = `${o.ServiceType?.name} · ${o.weight_kg} Kg`;
      document.getElementById('pSubtotal').textContent = formatRp(selectedTotal);
      document.getElementById('pTotal').textContent    = formatRp(selectedTotal);
      document.getElementById('payAmount').value       = selectedTotal;
      calcChange();

      document.getElementById('emptyState').style.display  = 'none';
      document.getElementById('paymentForm').style.display = 'block';
    }

    function calcChange() {
      const paid = parseFloat(document.getElementById('payAmount').value) || 0;
      const change = paid - selectedTotal;
      const el = document.getElementById('payChange');
      el.textContent = change >= 0 ? formatRp(change) : '-' + formatRp(Math.abs(change));
      el.className = 'fw-700 fs-20 ' + (change >= 0 ? 'change-positive' : 'change-negative');
    }

    async function processPayment() {
      const orderId = document.getElementById('payOrderId').value;
      const amount  = parseFloat(document.getElementById('payAmount').value);
      const method  = document.getElementById('payMethod').value;

      if (!orderId) { toast('Pilih pesanan terlebih dahulu', 'warning'); return; }
      if (amount < selectedTotal) { toast('Uang pembayaran kurang!', 'error'); return; }

      const btn = document.getElementById('btnConfirmPay');
      btn.disabled = true; btn.textContent = '⏳ Memproses...';

      const { ok, data } = await api('/payments', 'POST', { order_id: orderId, amount_paid: amount, payment_method: method });

      btn.disabled = false; btn.textContent = '✓ Konfirmasi Pembayaran';

      if (ok) {
        const o = allOrders.find(x => x.id === parseInt(orderId));
        const change = amount - selectedTotal;
        document.getElementById('receiptBody').innerHTML = `
          <div class="highlight-box mb-16" style="text-align:center;">
            <div style="font-size:32px;margin-bottom:8px;">🎉</div>
            <div class="font-mono fw-700 fs-14" style="color:var(--brand-primary);">${o?.order_code}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div class="d-flex justify-between fs-13"><span class="text-muted">Pelanggan</span><span class="fw-600">${o?.Customer?.name}</span></div>
            <div class="d-flex justify-between fs-13"><span class="text-muted">Layanan</span><span>${o?.ServiceType?.name} · ${o?.weight_kg} Kg</span></div>
            <div class="separator"></div>
            <div class="d-flex justify-between fs-13"><span class="text-muted">Total Tagihan</span><span class="fw-700">${formatRp(selectedTotal)}</span></div>
            <div class="d-flex justify-between fs-13"><span class="text-muted">Dibayar</span><span>${formatRp(amount)}</span></div>
            <div class="d-flex justify-between fs-14"><span class="text-muted fw-600">Kembalian</span><span class="fw-700 change-positive">${formatRp(change)}</span></div>
            <div class="d-flex justify-between fs-13"><span class="text-muted">Metode</span><span>${method}</span></div>
          </div>
        `;
        window._lastReceipt = { o, amount, change, method };
        openModal('receiptModal');
      } else {
        toast(data.message || 'Gagal memproses pembayaran', 'error');
      }
    }

    function printReceipt() {
      const r = window._lastReceipt;
      if (!r) return;
      const html = `
        <style>body{font-family:monospace;max-width:280px;margin:auto;padding:20px}h2{text-align:center;margin-bottom:4px}p{margin:3px 0;font-size:13px}.d{border-top:1px dashed #000;margin:10px 0}.r{text-align:right}.b{font-weight:bold}</style>
        <h2>🧺 KiloWash</h2><p style="text-align:center;font-size:11px;">Bukti Pembayaran</p>
        <div class="d"></div>
        <p>Order : <span class="b">${r.o?.order_code}</span></p>
        <p>Tgl   : ${new Date().toLocaleDateString('id-ID')}</p>
        <p>Jam   : ${new Date().toLocaleTimeString('id-ID')}</p>
        <div class="d"></div>
        <p>Pelanggan  : ${r.o?.Customer?.name}</p>
        <p>No. WA     : ${r.o?.Customer?.phone}</p>
        <div class="d"></div>
        <p>Layanan    : ${r.o?.ServiceType?.name}</p>
        <p>Berat      : ${r.o?.weight_kg} Kg</p>
        <p>Total      : ${formatRp(selectedTotal)}</p>
        <p>Dibayar    : ${formatRp(r.amount)}</p>
        <p class="b">Kembalian  : ${formatRp(r.change)}</p>
        <p>Metode     : ${r.method}</p>
        <div class="d"></div>
        <p style="text-align:center;">Terima kasih! 🧺</p>
      `;
      const w = window.open('','_blank','width=350,height=600');
      w.document.write(html);
      w.document.close();
      w.print();
    }
  </script>
</body>
</html>
