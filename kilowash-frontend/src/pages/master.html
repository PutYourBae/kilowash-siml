<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Master | KiloWash</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap">
  <link rel="stylesheet" href="../styles/app.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%BA%3C/text%3E%3C/svg%3E">
  <meta name="view-transition" content="same-origin">
</head>
<body>
  <div class="app-layout">
    <app-sidebar></app-sidebar>
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">
          <h1>Data Master</h1>
          <p>Kelola layanan dan akun karyawan</p>
        </div>
      </div>

      <div class="page-body">
        <!-- Tabs -->
        <div style="display:flex;gap:4px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:4px;margin-bottom:20px;width:fit-content;">
          <button class="btn tab-btn active" data-tab="services" onclick="switchTab('services')">🧺 Layanan</button>
          <button class="btn tab-btn" data-tab="users" onclick="switchTab('users')">👥 Karyawan</button>
        </div>

        <!-- Tab: Layanan -->
        <div id="tab-services">
          <div class="card">
            <div class="card-header">
              <h3>Jenis Layanan</h3>
              <button class="btn btn-primary btn-sm" id="btnAddService">+ Tambah Layanan</button>
            </div>
            <div class="table-wrapper">
              <table class="data-table">
                <thead><tr><th>#</th><th>Nama Layanan</th><th>Harga / Satuan</th><th>Min Order</th><th>Estimasi Selesai</th><th>Status</th><th>Aksi</th></tr></thead>
                <tbody id="serviceTable"><tr><td colspan="6" style="text-align:center;padding:30px;">Memuat...</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Tab: Karyawan -->
        <div id="tab-users" style="display:none;">
          <div class="card">
            <div class="card-header">
              <h3>Akun Karyawan</h3>
              <button class="btn btn-primary btn-sm" id="btnAddUser">+ Tambah Karyawan</button>
            </div>
            <div class="table-wrapper">
              <table class="data-table">
                <thead><tr><th>Nama</th><th>Email</th><th>Role</th><th>Status</th><th>Aksi</th></tr></thead>
                <tbody id="userTable"><tr><td colspan="5" style="text-align:center;padding:30px;">Memuat...</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Service -->
  <div class="modal-overlay" id="serviceModal">
    <div class="modal" style="max-width:460px;">
      <div class="modal-header">
        <h3 id="serviceModalTitle">Tambah Layanan</h3>
        <button class="modal-close" onclick="closeModal('serviceModal')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="svcId">
        <div class="form-group">
          <label class="form-label">Nama Layanan *</label>
          <input type="text" id="svcName" class="form-control" placeholder="Contoh: Cuci Setrika Reguler">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" id="svcPriceLabel">Harga per Kg (Rp) *</label>
            <input type="number" id="svcPrice" class="form-control" placeholder="8000">
          </div>
          <div class="form-group">
            <label class="form-label">Satuan *</label>
            <select id="svcUnit" class="form-control" onchange="updateSvcPriceLabel()">
              <option value="kg">Per Kg</option>
              <option value="pcs">Per Pcs</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Minimal Order *</label>
            <input type="number" id="svcMin" class="form-control" step="0.5" min="1" placeholder="1">
          </div>
          <div class="form-group">
            <label class="form-label">Estimasi Selesai (Hari) *</label>
            <input type="number" id="svcDays" class="form-control" placeholder="2">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="svcActive" class="form-control">
            <option value="true">Aktif</option>
            <option value="false">Non-Aktif</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('serviceModal')">Batal</button>
        <button class="btn btn-primary" id="saveSvcBtn" onclick="saveService()">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal: User -->
  <div class="modal-overlay" id="userModal">
    <div class="modal" style="max-width:460px;">
      <div class="modal-header">
        <h3 id="userModalTitle">Tambah Karyawan</h3>
        <button class="modal-close" onclick="closeModal('userModal')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="userId">
        <div class="form-group">
          <label class="form-label">Nama Lengkap *</label>
          <input type="text" id="uName" class="form-control">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input type="email" id="uEmail" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Role *</label>
            <select id="uRole" class="form-control">
              <option value="admin">Admin</option>
              <option value="kasir">Kasir</option>
              <option value="petugas">Petugas</option>
              <option value="owner">Owner</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" id="pwLabel">Password *</label>
          <input type="password" id="uPassword" class="form-control" placeholder="Min. 6 karakter">
          <div class="fs-12 text-muted mt-4" id="pwHint" style="display:none;">Kosongkan jika tidak ingin mengubah password</div>
        </div>
        <div class="form-group" id="activeGroup" style="display:none;">
          <label class="form-label">Status</label>
          <select id="uActive" class="form-control">
            <option value="true">Aktif</option>
            <option value="false">Non-Aktif</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('userModal')">Batal</button>
        <button class="btn btn-primary" onclick="saveUser()">Simpan</button>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      requireAuth(['owner']);
      loadServices();
      loadUsers();
      document.getElementById('btnAddService').addEventListener('click', () => openServiceModal());
      document.getElementById('btnAddUser').addEventListener('click', () => openUserModal());
    });

    function switchTab(tab) {
      document.getElementById('tab-services').style.display = tab === 'services' ? 'block' : 'none';
      document.getElementById('tab-users').style.display    = tab === 'users'    ? 'block' : 'none';
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('btn-primary', b.dataset.tab === tab));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    }

    async function loadServices() {
      const { ok, data } = await api('/master/services');
      const tbody = document.getElementById('serviceTable');
      if (!ok) { tbody.innerHTML = '<tr><td colspan="6">Gagal memuat</td></tr>'; return; }
        tbody.innerHTML = data.services.map((s, i) => `
        <tr>
          <td class="text-muted fs-13">${i+1}</td>
          <td class="fw-600">${s.name}</td>
          <td>${formatRp(s.price_per_kg)} / ${s.unit === 'pcs' ? 'Pcs' : 'Kg'}</td>
          <td class="fs-13 text-muted">Min ${parseFloat(s.min_order || 1)} ${s.unit === 'pcs' ? 'pcs' : 'kg'}</td>
          <td>${s.est_days} Hari</td>
          <td><span class="badge ${s.is_active ? 'badge-success' : 'badge-diambil'}">${s.is_active ? 'Aktif' : 'Non-Aktif'}</span></td>
          <td><button class="btn btn-secondary btn-sm" onclick="openServiceModal(${JSON.stringify(s).replace(/"/g, '&quot;')})">Edit</button></td>
        </tr>
      `).join('');
    }

    async function loadUsers() {
      const { ok, data } = await api('/master/users');
      const tbody = document.getElementById('userTable');
      if (!ok) { tbody.innerHTML = '<tr><td colspan="5">Gagal memuat</td></tr>'; return; }
      tbody.innerHTML = data.users.map(u => `
        <tr>
          <td class="fw-600">${u.name}</td>
          <td class="fs-13 text-secondary">${u.email}</td>
          <td><span class="badge badge-info" style="text-transform:capitalize;">${u.role}</span></td>
          <td><span class="badge ${u.is_active ? 'badge-success' : 'badge-diambil'}">${u.is_active ? 'Aktif' : 'Non-Aktif'}</span></td>
          <td><button class="btn btn-secondary btn-sm" onclick='openUserModal(${JSON.stringify(u)})'>Edit</button></td>
        </tr>
      `).join('');
    }

    function updateSvcPriceLabel() {
      const unit = document.getElementById('svcUnit').value;
      document.getElementById('svcPriceLabel').textContent = unit === 'pcs' ? 'Harga per Pcs (Rp) *' : 'Harga per Kg (Rp) *';
    }

    function openServiceModal(s = null) {
      document.getElementById('serviceModalTitle').textContent = s ? 'Edit Layanan' : 'Tambah Layanan';
      document.getElementById('svcId').value     = s?.id || '';
      document.getElementById('svcName').value   = s?.name || '';
      document.getElementById('svcPrice').value  = s?.price_per_kg || '';
      document.getElementById('svcUnit').value   = s?.unit || 'kg';
      document.getElementById('svcMin').value    = s?.min_order || 1;
      document.getElementById('svcDays').value   = s?.est_days || '';
      document.getElementById('svcActive').value = s ? String(s.is_active) : 'true';
      updateSvcPriceLabel();
      openModal('serviceModal');
    }

    async function saveService() {
      const id = document.getElementById('svcId').value;
      const payload = {
        name:         document.getElementById('svcName').value.trim(),
        price_per_kg: document.getElementById('svcPrice').value,
        unit:         document.getElementById('svcUnit').value,
        min_order:    document.getElementById('svcMin').value,
        est_days:     document.getElementById('svcDays').value,
        is_active:    document.getElementById('svcActive').value === 'true'
      };
      if (!payload.name || !payload.price_per_kg || !payload.est_days) { toast('Lengkapi semua field!', 'warning'); return; }

      const { ok } = id ? await api(`/master/services/${id}`, 'PUT', payload) : await api('/master/services', 'POST', payload);
      if (ok) { toast('Layanan berhasil disimpan!', 'success'); closeModal('serviceModal'); loadServices(); }
      else toast('Gagal menyimpan layanan', 'error');
    }

    function openUserModal(u = null) {
      document.getElementById('userModalTitle').textContent = u ? 'Edit Karyawan' : 'Tambah Karyawan';
      document.getElementById('userId').value    = u?.id || '';
      document.getElementById('uName').value     = u?.name || '';
      document.getElementById('uEmail').value    = u?.email || '';
      document.getElementById('uRole').value     = u?.role || 'kasir';
      document.getElementById('uPassword').value = '';
      document.getElementById('uActive').value   = u ? String(u.is_active) : 'true';
      document.getElementById('pwLabel').textContent = u ? 'Password (Opsional)' : 'Password *';
      document.getElementById('pwHint').style.display = u ? 'block' : 'none';
      document.getElementById('activeGroup').style.display = u ? 'block' : 'none';
      document.getElementById('uEmail').disabled = !!u;
      openModal('userModal');
    }

    async function saveUser() {
      const id = document.getElementById('userId').value;
      const payload = {
        name: document.getElementById('uName').value.trim(),
        email: document.getElementById('uEmail').value.trim(),
        role: document.getElementById('uRole').value,
        is_active: document.getElementById('uActive').value === 'true'
      };
      const pw = document.getElementById('uPassword').value;
      if (pw) payload.password = pw;

      if (!payload.name || (!id && !payload.email) || (!id && !pw)) { toast('Lengkapi semua field wajib!', 'warning'); return; }

      const { ok, data } = id ? await api(`/master/users/${id}`, 'PUT', payload) : await api('/master/users', 'POST', { ...payload, password: pw });
      if (ok) { toast('Karyawan berhasil disimpan!', 'success'); closeModal('userModal'); loadUsers(); }
      else toast(data.message || 'Gagal menyimpan', 'error');
    }
  </script>
</body>
</html>
