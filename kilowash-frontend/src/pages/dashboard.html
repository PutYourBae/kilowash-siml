<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | KiloWash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap">
  <link rel="stylesheet" href="../styles/app.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%BA%3C/text%3E%3C/svg%3E">
  <meta name="view-transition" content="same-origin">
</head>
<body>
  <div class="app-layout">
    <app-sidebar></app-sidebar>
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">
          <h1>Dashboard</h1>
          <p id="dateText"></p>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-secondary btn-sm" id="refreshBtn">⟳ Refresh</button>
        </div>
      </div>

      <div class="page-body">
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card s-blue">
            <div class="stat-card-inner">
              <div class="stat-icon blue">📋</div>
              <div class="stat-value" id="s-total">—</div>
              <div class="stat-label">Total Order Hari Ini</div>
            </div>
          </div>
          <div class="stat-card s-amber">
            <div class="stat-card-inner">
              <div class="stat-icon amber">⏳</div>
              <div class="stat-value" id="s-pending">—</div>
              <div class="stat-label">Sedang Diproses</div>
            </div>
          </div>
          <div class="stat-card s-green">
            <div class="stat-card-inner">
              <div class="stat-icon green">✅</div>
              <div class="stat-value" id="s-done">—</div>
              <div class="stat-label">Order Selesai</div>
            </div>
          </div>
          <div class="stat-card s-green">
            <div class="stat-card-inner">
              <div class="stat-icon green">💰</div>
              <div class="stat-value" id="s-revenue" style="font-size:18px">—</div>
              <div class="stat-label">Pendapatan Hari Ini</div>
            </div>
          </div>
        </div>

        <!-- Grid -->
        <div style="display:grid;grid-template-columns:1fr 340px;gap:20px;">
          <!-- Monthly Chart -->
          <div class="card">
            <div class="card-header">
              <h3>📈 Grafik Pendapatan Bulanan</h3>
              <div style="display:flex;gap:8px;">
                <select id="chartMonth" class="form-control" style="width:auto;padding:6px 10px;font-size:12px;"></select>
                <select id="chartYear" class="form-control" style="width:auto;padding:6px 10px;font-size:12px;"></select>
              </div>
            </div>
            <div class="card-body" style="height:280px;position:relative;">
              <canvas id="revenueChart"></canvas>
            </div>
          </div>

          <!-- Recent Orders -->
          <div class="card">
            <div class="card-header">
              <h3>📋 Order Terbaru</h3>
              <a href="orders.html" class="btn btn-ghost btn-sm">Lihat Semua →</a>
            </div>
            <div id="recentOrders" style="overflow-y:auto;max-height:300px;">
              <div class="empty-state"><div class="empty-icon">📭</div><h4>Memuat...</h4></div>
            </div>
          </div>
        </div>

        <!-- Service Breakdown -->
        <div class="card mt-20">
          <div class="card-header">
            <h3>💼 Breakdown Layanan Hari Ini</h3>
          </div>
          <div class="card-body">
            <div id="breakdown">
              <p class="text-muted fs-13">Belum ada data transaksi hari ini.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    let chart;
    document.addEventListener('DOMContentLoaded', async () => {
      const user = requireAuth(['owner', 'admin']);
      if (!user) return;

      document.getElementById('dateText').textContent = new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

      // Populate selects
      const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
      const mSel = document.getElementById('chartMonth');
      const ySel = document.getElementById('chartYear');
      const curM = new Date().getMonth();
      const curY = new Date().getFullYear();
      months.forEach((m,i) => { mSel.innerHTML += `<option value="${i+1}" ${i===curM?'selected':''}>${m}</option>`; });
      for (let y = curY; y >= curY-2; y--) ySel.innerHTML += `<option value="${y}" ${y===curY?'selected':''}>${y}</option>`;

      await loadDashboard();
      await loadChart();

      document.getElementById('refreshBtn').addEventListener('click', () => { loadDashboard(); loadChart(); });
      mSel.addEventListener('change', loadChart);
      ySel.addEventListener('change', loadChart);
    });

    async function loadDashboard() {
      const { ok, data } = await api('/reports/daily');
      if (ok && data.success) {
        const d = data.data;
        document.getElementById('s-total').textContent   = d.total_orders;
        document.getElementById('s-pending').textContent = d.pending_orders;
        document.getElementById('s-done').textContent    = d.completed_orders;
        document.getElementById('s-revenue').textContent = formatRp(d.total_revenue);

        // Breakdown
        const bd = document.getElementById('breakdown');
        const entries = Object.entries(d.breakdown);
        if (entries.length === 0) {
          bd.innerHTML = '<p class="text-muted fs-13">Belum ada data transaksi hari ini.</p>';
        } else {
          bd.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;">
            ${entries.map(([name, info]) => `
              <div class="highlight-box">
                <div class="fw-600 mb-4">${name}</div>
                <div class="fs-12 text-muted mb-8">${info.count} transaksi</div>
                <div class="fw-700 fs-16" style="color:var(--brand-primary);">${formatRp(info.revenue)}</div>
              </div>`).join('')}
          </div>`;
        }
      }

      // Recent Orders
      const { ok: ok2, data: d2 } = await api('/orders');
      if (ok2 && d2.success) {
        const recent = d2.orders.slice(0, 6);
        const el = document.getElementById('recentOrders');
        if (recent.length === 0) {
          el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><h4>Belum ada order</h4></div>';
          return;
        }
        el.innerHTML = recent.map(o => `
          <div style="padding:12px 20px;border-bottom:1px solid var(--color-border-light);display:flex;justify-content:space-between;align-items:center;">
            <div>
              <div class="font-mono fs-12 fw-600" style="color:var(--brand-primary);margin-bottom:2px;">${o.order_code}</div>
              <div class="fs-13 fw-600">${o.Customer?.name || '—'}</div>
              <div class="fs-12 text-muted">${o.ServiceType?.name || '—'} · ${o.weight_kg} Kg</div>
            </div>
            <span class="badge badge-${o.status}">${statusLabel[o.status] || o.status}</span>
          </div>`).join('');
      }
    }

    async function loadChart() {
      const month = document.getElementById('chartMonth').value;
      const year  = document.getElementById('chartYear').value;
      const { ok, data } = await api(`/reports/monthly?month=${month}&year=${year}`);
      if (!ok || !data.success) return;

      const labels   = data.data.chart.map(d => d.date.slice(8));
      const revenues = data.data.chart.map(d => d.revenue);

      const ctx = document.getElementById('revenueChart').getContext('2d');
      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Pendapatan (Rp)',
            data: revenues,
            backgroundColor: 'rgba(18,184,134,0.12)',
            borderColor: '#12B886',
            borderWidth: 2,
            borderRadius: 6,
            hoverBackgroundColor: 'rgba(18,184,134,0.25)',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ' ' + formatRp(ctx.raw)
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#94A3B8' } },
            y: {
              grid: { color: '#F1F5F9' },
              ticks: {
                font: { size: 11 },
                color: '#94A3B8',
                callback: v => v === 0 ? '0' : (v >= 1000000 ? (v/1000000).toFixed(1) + 'jt' : (v/1000).toFixed(0) + 'rb')
              }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
